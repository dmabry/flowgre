name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      VERSION: "${{ github.ref_name }}"
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build multi-platform
      run: |
        bash ./scripts/build-multiplatform.sh "${{ env.VERSION }}"

    - name: List built files
      run: |
        ls -l flowgre_*

    - name: Verify expected binaries
      run: |
        for bin in \
          flowgre_linux_amd64_${{ env.VERSION }} \
          flowgre_linux_arm64_${{ env.VERSION }} \
          flowgre_darwin_amd64_${{ env.VERSION }} \
          flowgre_darwin_arm64_${{ env.VERSION }} \
          flowgre_windows_amd64_${{ env.VERSION }} \
          flowgre_windows_arm64_${{ env.VERSION }}; do
          if [ ! -f "$bin" ]; then
            echo "ERROR: Expected binary not found: $bin"
            exit 1
          fi
        done

    - name: Build musl version
      run: |
        CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ env.VERSION }}" -o flowgre_linux_amd64_musl_${{ env.VERSION }}

    - name: Install nfpm
      run: |
        NFPM_VERSION="2.46.3"
        NFPM_DEB="nfpm_${NFPM_VERSION}_amd64.deb"
        curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/${NFPM_DEB}" -o nfpm.deb
        curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/checksums.txt" -o checksums.txt
        EXPECTED_SHA="$(grep "${NFPM_DEB}" checksums.txt | awk '{print $1}')"
        if [ -n "$EXPECTED_SHA" ]; then
          echo "$EXPECTED_SHA  nfpm.deb" | sha256sum -c -
        else
          echo "ERROR: checksum not found in checksums.txt for ${NFPM_DEB}"
          exit 1
        fi
        sudo apt-get install -y ./nfpm.deb
        rm -f nfpm.deb checksums.txt

    - name: Package RPM and DEB
      env:
        BINARY: "./flowgre_linux_amd64_${{ env.VERSION }}"
      run: |
        nfpm package -p rpm -f ./.nfpm/nfpm-linux-amd64.yaml
        nfpm package -p deb -f ./.nfpm/nfpm-linux-amd64.yaml

    - name: Package APK
      env:
        BINARY: "./flowgre_linux_amd64_musl_${{ env.VERSION }}"
      run: |
        nfpm package -p apk -f ./.nfpm/nfpm-alpine-amd64.yaml

    - name: Generate SBOM
      run: |
        mkdir -p ./bin
        TRIVY_VERSION="0.70.0"
        TRIVY_ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
        CHECKSUMS="trivy_${TRIVY_VERSION}_checksums.txt"
        curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_ARCHIVE}" -o "${TRIVY_ARCHIVE}"
        curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${CHECKSUMS}" -o "${CHECKSUMS}"
        EXPECTED_SHA="$(grep "${TRIVY_ARCHIVE}" "${CHECKSUMS}" | awk '{print $1}')"
        if [ -n "$EXPECTED_SHA" ]; then
          echo "$EXPECTED_SHA  ${TRIVY_ARCHIVE}" | sha256sum -c -
        else
          echo "ERROR: checksum not found in ${CHECKSUMS} for ${TRIVY_ARCHIVE}"
          exit 1
        fi
        tar xzf "${TRIVY_ARCHIVE}" && mv trivy ./bin/
        rm -f "${TRIVY_ARCHIVE}" "${CHECKSUMS}"
        ./bin/trivy fs --format cyclonedx --output sbom_${{ env.VERSION }}.json .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          flowgre_*
          flowgre-*
          sbom_*
        body: "Flowgre, version ${{ env.VERSION }}"
        name: "${{ env.VERSION }}"
        prerelease: true
