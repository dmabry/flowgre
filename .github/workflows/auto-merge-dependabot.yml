name: Auto-merge Dependabot PRs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: |
          go test -v ./... -count 1
          go build

      - name: Enable auto-merge
        if: success()
        run: gh pr merge --rebase --delete-branch ${{ github.event.pull_request.number }}